<!DOCTYPE html>
<html>
<head>
  <title>Audio + Hands Performance</title>
  <link rel="stylesheet" href="style.css">
</head>

<div id="credit">P.S All sounds were created with Hellmann's Mayonnaise</div>

<body>

<!-- VISUAL FX LAYERS -->
<div id="bgGlow"></div>
<canvas id="fxCanvas"></canvas>
<canvas id="mayoCanvas" style="
  position: fixed; inset: 0;
  width: 100vw; height: 100vh;
  pointer-events: none;
  z-index: 3;
"></canvas>
<div id="beatFlash"></div>
<div id="xfade"><div id="xfadeFill"></div></div>

<!-- =========================
     DEBUG HUD
========================= -->
<div id="debug" style="
  position: fixed;
  top: 12px;
  left: 12px;
  padding: 10px 14px;
  background: rgba(0,0,0,0.6);
  color: #00f0ff;
  font-family: monospace;
  font-size: 12px;
  border-radius: 10px;
  z-index: 9999;
  backdrop-filter: blur(10px);
  white-space: pre;
  pointer-events: none;
">
  Ready
</div>

<!-- =========================
     START BUTTON
========================= -->
<button id="start" style="
  position: fixed;
  top: 12px;
  right: 12px;
  padding: 10px 16px;
  z-index: 9999;
">
  Start Audio
</button>

<!-- =========================
     CONTROLS - REMOVE RE_ADD IF NEEDED
========================= -->


<!-- =========================
     WEBCAM FEED + HAND OVERLAY
========================= -->
<video
  id="video"
  autoplay
  playsinline
  style="
    position: fixed;
    top: 50px;
    left: 20px;
    width: 240px;
    height: 180px;
    border-radius: 12px;
    border: 3px solid #002862;
    box-shadow: 0 0 25px #002862;
    object-fit: cover;
    z-index: 9999;
  "
></video>

<canvas
  id="overlay"
  width="240"
  height="180"
  style="
    position: fixed;
    top: 50px;
    left: 20px;
    width: 240px;
    height: 180px;
    border-radius: 12px;
    border: 3px solid transparent;
    pointer-events: none;
    z-index: 10000;
  "
></canvas>

<!-- =========================
     LIBRARIES
========================= -->
<script src="https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<!-- BUTTONS -->
<div id="sfxButtons">
  <div class="sfxBtn" id="capBtn">CAP</div>
  <div class="sfxBtn" id="splatBtn">SPLAT</div>
  <div class="sfxBtn" id="squeezeBtn">SQUEEZE</div>
  <div class="sfxBtn" id="stirBtn">STIR</div>
</div>

<canvas id="eqCanvas" width="600" height="160"
  style="position:fixed;bottom:20px;right:280px;border-radius:12px;"></canvas>

<!-- YOUR APP -->
<script src="app.js"></script>

<!-- =========================
     MAYO VISUAL EFFECTS — liquid 3D
     Draws on #mayoCanvas, triggered via MutationObserver.
     No changes to app.js, style.css, or fxCanvas.
========================= -->
<script>
(function () {

  const canvas = document.getElementById('mayoCanvas');
  const ctx    = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  /* ---- pools ---- */
  const droplets = [];   /* SPLAT */
  const swirlers = [];   /* STIR  */

  /* =============================================
     SPLAT — 22 liquid spheres burst from centre.
     Each stretches along its velocity vector and
     carries 1-3 micro-satellite drops.
  ============================================= */
  function spawnSplat() {
    const cx = canvas.width  / 2;
    const cy = canvas.height / 2;
    const N  = 22;

    for (let i = 0; i < N; i++) {
      const angle = (i / N) * Math.PI * 2 + (Math.random() - 0.5) * 0.55;
      const speed = 7 + Math.random() * 15;
      const r     = 9 + Math.random() * 19;

      droplets.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        r,
        alpha:       1,
        wobble:      Math.random() * Math.PI * 2,
        wobbleSpeed: 0.07 + Math.random() * 0.06,
        /* micro satellites */
        sats: Array.from({ length: Math.floor(Math.random() * 3) + 1 }, () => ({
          ox: (Math.random() - 0.5) * r * 2.8,
          oy: (Math.random() - 0.5) * r * 2.8,
          r:  2 + Math.random() * 5,
        })),
      });
    }
  }

  /* =============================================
     STIR — 80 particles orbit in a perspective
     ellipse (viewed ~30° above). Ribbon trails
     connect consecutive positions. Depth scaling
     makes particles behind the vortex smaller.
  ============================================= */
  function spawnStir() {
    const cx = canvas.width  / 2;
    const cy = canvas.height / 2;
    const N  = 80;

    for (let i = 0; i < N; i++) {
      const a      = (i / N) * Math.PI * 6;   /* 3 full turns on spawn */
      const radius = 65 + Math.random() * 175;

      swirlers.push({
        cx, cy,
        angle:  a,
        radius,
        speed:  0.042 + Math.random() * 0.038,
        r:      2.5 + Math.random() * 5.5,
        alpha:  0.88,
        prevX:  null,
        prevY:  null,
      });
    }
  }

  /* =============================================
     DRAW a 3-layer liquid sphere:
       1. volumetric body gradient (light from top-left)
       2. sharp specular highlight
       3. subtle rim stroke
  ============================================= */
  function drawSphere(x, y, r, alpha) {
    if (r <= 0 || alpha <= 0) return;

    /* body — cream shading */
    const hx = x - r * 0.28;
    const hy = y - r * 0.32;

    const body = ctx.createRadialGradient(hx, hy, r * 0.05, x, y, r);
    body.addColorStop(0,    `rgba(255,252,246,${alpha})`);
    body.addColorStop(0.28, `rgba(241,233,220,${alpha * 0.95})`);
    body.addColorStop(0.65, `rgba(218,207,192,${alpha * 0.88})`);
    body.addColorStop(1,    `rgba(185,170,152,${alpha * 0.35})`);

    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = body;
    ctx.fill();

    /* specular — small white glint */
    const spec = ctx.createRadialGradient(hx, hy, 0, hx, hy, r * 0.42);
    spec.addColorStop(0,   `rgba(255,255,255,${alpha * 0.92})`);
    spec.addColorStop(0.5, `rgba(255,255,255,${alpha * 0.28})`);
    spec.addColorStop(1,   `rgba(255,255,255,0)`);

    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = spec;
    ctx.fill();

    /* rim light */
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(241,233,220,${alpha * 0.38})`;
    ctx.lineWidth   = 1.2;
    ctx.stroke();
  }

  /* =============================================
     MAIN LOOP
  ============================================= */
  const TILT = 0.36;   /* perspective y-compression for stir vortex */

  function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    /* ---- SPLAT droplets ---- */
    for (let i = droplets.length - 1; i >= 0; i--) {
      const d     = droplets[i];
      const speed = Math.hypot(d.vx, d.vy);

      d.x     += d.vx;
      d.y     += d.vy;
      d.vx    *= 0.905;
      d.vy    *= 0.905;
      d.alpha *= 0.932;
      d.wobble += d.wobbleSpeed;

      if (d.alpha < 0.018) { droplets.splice(i, 1); continue; }

      /* surface-tension wobble on radius */
      const wr = d.r * (1 + Math.sin(d.wobble) * 0.065);

      /* stretch along travel direction when fast */
      const sx    = 1 + (speed / 18) * 1.3;
      const sy    = 1 / sx;
      const tAngle = Math.atan2(d.vy, d.vx);

      /* soft drop shadow for 3D lift */
      ctx.shadowColor    = 'rgba(140,120,100,0.35)';
      ctx.shadowBlur     = 12;
      ctx.shadowOffsetX  = 2;
      ctx.shadowOffsetY  = 5;

      ctx.save();
      ctx.translate(d.x, d.y);
      ctx.rotate(tAngle);
      ctx.scale(sx, sy);
      drawSphere(0, 0, wr, d.alpha);
      ctx.restore();

      ctx.shadowBlur = ctx.shadowOffsetX = ctx.shadowOffsetY = 0;

      /* satellite micro-drops spread as main drop decelerates */
      const spread = 1 - d.alpha;   /* 0→1 as drop fades */
      for (const s of d.sats) {
        const sr = s.r * d.alpha;
        if (sr < 0.5) continue;
        drawSphere(
          d.x + s.ox * spread * 1.4,
          d.y + s.oy * spread * 1.4,
          sr,
          d.alpha * 0.75
        );
      }
    }

    /* ---- STIR vortex ---- */
    for (let i = swirlers.length - 1; i >= 0; i--) {
      const s = swirlers[i];

      /* save previous screen position for ribbon */
      const px = s.cx + Math.cos(s.angle) * s.radius;
      const py = s.cy + Math.sin(s.angle) * s.radius * TILT;

      s.angle  += s.speed;
      s.radius *= 0.9935;
      s.alpha  *= 0.973;

      if (s.alpha < 0.018) { swirlers.splice(i, 1); continue; }

      const x = s.cx + Math.cos(s.angle) * s.radius;
      const y = s.cy + Math.sin(s.angle) * s.radius * TILT;

      /* depth: sin(angle) maps front (+1) ↔ back (-1) of ellipse */
      const depth = Math.sin(s.angle) * 0.5 + 0.5;   /* 0 = back, 1 = front */
      const dScale = 0.45 + depth * 0.55;

      /* ribbon connecting prev → cur position */
      if (s.prevX !== null) {
        ctx.beginPath();
        ctx.moveTo(s.prevX, s.prevY);
        ctx.lineTo(x, y);
        ctx.strokeStyle = `rgba(241,233,220,${s.alpha * 0.3 * dScale})`;
        ctx.lineWidth   = s.r * dScale * 0.9;
        ctx.lineCap     = 'round';
        ctx.stroke();
      }
      s.prevX = px;
      s.prevY = py;

      /* sphere — smaller + dimmer when "behind" in vortex */
      drawSphere(x, y, s.r * dScale, s.alpha * dScale);
    }

    ctx.globalAlpha   = 1;
    ctx.shadowBlur    = 0;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 0;
    requestAnimationFrame(loop);
  }
  loop();

  /* ---- MutationObserver — fires on existing .active class toggle ---- */
  window.addEventListener('load', () => {
    const splatBtn = document.getElementById('splatBtn');
    const stirBtn  = document.getElementById('stirBtn');

    const obs = new MutationObserver(mutations => {
      for (const m of mutations) {
        if (m.attributeName !== 'class') continue;
        if (!m.target.classList.contains('active')) continue;
        if (m.target === splatBtn) spawnSplat();
        if (m.target === stirBtn)  spawnStir();
      }
    });

    if (splatBtn) obs.observe(splatBtn, { attributes: true });
    if (stirBtn)  obs.observe(stirBtn,  { attributes: true });
  });

})();
</script>

</body>
</html>
